<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Scriptures — Vedic Corner</title>
  <meta name="description" content="Search verses, chants, and hymns across Vedic Corner.">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:wght@400;500&family=Playfair+Display:wght@600;700;800&family=Noto+Sans+Tamil:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css">
  <style>
    .vc-search-bar {
      display: flex;
      gap: 0.6rem;
      max-width: 640px;
      margin: 0 auto 1rem;
    }
    .vc-search-input {
      flex: 1;
      font-family: 'Crimson Text', serif;
      font-size: 1.1rem;
      padding: 0.8rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,0.4);
      background: rgba(255,255,255,0.8);
      outline: none;
    }
    .vc-search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--glow); }
    .vc-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
    .vc-filter-chip {
      font-size: 0.85rem; padding: 0.35rem 0.9rem; border-radius: 999px;
      border: 1px solid rgba(139,155,122,0.4); background: transparent; color: var(--deep-sage);
      cursor: pointer; font-family: 'Lora', serif;
    }
    .vc-filter-chip.active { background: var(--sage); color: #fff; border-color: var(--sage); }
    .vc-result-count { text-align: center; color: var(--deep-sage); margin-bottom: 1.5rem; font-size: 0.95rem; }
    .vc-empty { text-align: center; color: var(--deep-sage); padding: 3rem 1rem; }
    mark { background: var(--light-gold); color: var(--text-dark); border-radius: 3px; padding: 0 2px; }
  </style>
</head>
<body class="vc-body">
  <a href="#main" class="vc-skip-link">Skip to content</a>

  <header class="vc-header">
    <div class="vc-header-inner">
      <a class="vc-brand" href="index.html"><img src="logo.png" alt=""> Vedic Corner</a>
      <nav class="vc-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="verse.html">Daily Verse</a>
        <a href="tamil_poems.html">Tamil Poems</a>
        <a href="search.html">Search</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="vc-page-hero">
      <div class="vc-om">🔍</div>
      <h1 class="vc-page-title">Search Scriptures</h1>
      <p class="vc-page-sub">Search across the Bhagavad Gita, Shiva Panchakshara, Kantha Sasti Kavasam, Thiruvasagam, and Kanthar Anuboothi — by Sanskrit/Tamil text or English meaning.</p>
    </section>

    <div class="vc-container">
      <div class="vc-search-bar">
        <input id="q" class="vc-search-input" type="search" placeholder="Try “peace”, “Shiva”, “karma”, “grace”…" autocomplete="off">
      </div>
      <div id="filters" class="vc-filters"></div>
      <div id="count" class="vc-result-count" aria-live="polite"></div>
      <div id="results"></div>
    </div>
  </main>

  <footer class="vc-footer">
    <div class="vc-footer-ornament">✧ ॐ ✧</div>
    © <span id="year"></span> Vedic Corner — Built with care
  </footer>

  <script src="assets/content.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const collections = [...new Set(VC_CONTENT.map(v => v.collection))];
    let activeCollection = "All";

    const filtersEl = document.getElementById('filters');
    function renderFilters() {
      filtersEl.innerHTML = "";
      ["All", ...collections].forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'vc-filter-chip' + (c === activeCollection ? ' active' : '');
        btn.type = 'button';
        btn.textContent = c;
        btn.addEventListener('click', () => { activeCollection = c; renderFilters(); runSearch(); });
        filtersEl.appendChild(btn);
      });
    }
    renderFilters();

    function highlight(text, terms) {
      if (!terms.length) return text;
      let out = text;
      terms.forEach(t => {
        if (!t) return;
        const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
        out = out.replace(re, '<mark>$1</mark>');
      });
      return out;
    }

    function runSearch() {
      const raw = document.getElementById('q').value.trim();
      const terms = vcNormalize(raw).split(/\s+/).filter(Boolean);
      const resultsEl = document.getElementById('results');
      const countEl = document.getElementById('count');

      let pool = VC_CONTENT.filter(v => activeCollection === "All" || v.collection === activeCollection);

      let matches = pool.filter(v => {
        if (!terms.length) return true;
        const hay = vcNormalize(v.text + " " + v.meaning + " " + v.collection);
        return terms.every(t => hay.includes(t));
      });

      countEl.textContent = matches.length + (matches.length === 1 ? " verse found" : " verses found");

      if (!matches.length) {
        resultsEl.innerHTML = `<div class="vc-empty">No verses matched "${raw}". Try a shorter word, or browse a collection above.</div>`;
        return;
      }

      resultsEl.innerHTML = matches.slice(0, 60).map(v => `
        <a href="${v.url}" style="text-decoration:none;color:inherit;">
          <div class="vc-verse">
            <div class="vc-verse-index">${v.collection}${v.collectionTa ? " · " + v.collectionTa : ""}</div>
            <div class="vc-verse-original vc-tamil">${highlight(v.text, terms)}</div>
            <div class="vc-verse-meaning">${highlight(v.meaning, terms)}</div>
          </div>
        </a>
      `).join("");
    }

    document.getElementById('q').addEventListener('input', runSearch);

    // Support ?q= from links elsewhere on the site (e.g. old search links)
    const params = new URLSearchParams(window.location.search);
    if (params.get('q')) document.getElementById('q').value = params.get('q');

    runSearch();
  </script>
</body>
</html>
