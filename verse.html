<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Verse — Bhagavad Gita | Vedic Corner</title>
  <meta name="description" content="A new Bhagavad Gita verse each day, with Sanskrit text and meaning.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+Devanagari:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1a0e08; --ink-deep:#120906;
      --maroon:#5c1a1f; --maroon-bright:#7a2530;
      --vel-gold:#c89b3c; --gold-bright:#e6c877;
      --ivory:#f6efdd; --rule: rgba(200,155,60,0.35);
      --shadow: 0 18px 40px -20px rgba(0,0,0,0.55);
    }
    *{box-sizing:border-box;}
    @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

    body{
      margin:0; background:var(--ink); color:var(--ivory);
      font-family:'Crimson Text', serif; font-size:1.05rem; line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }
    a{ color:var(--gold-bright); }
    a:focus-visible, button:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:3px; }
    .vc-skip-link{ position:absolute; left:-999px; top:0; background:var(--maroon); color:var(--ivory); padding:0.6rem 1rem; z-index:100; }
    .vc-skip-link:focus{ left:1rem; top:1rem; }

    .vc-header{ position:sticky; top:0; z-index:20; background:rgba(18,9,6,0.72); backdrop-filter:blur(6px); border-bottom:1px solid var(--rule); }
    .vc-header-inner{ max-width:1080px; margin:0 auto; padding:0.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .vc-brand{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:1.25rem; color:var(--gold-bright); text-decoration:none; letter-spacing:0.02em; display:flex; align-items:center; gap:0.5rem; }
    .vc-brand svg{ width:20px; height:20px; }
    .vc-nav{ display:flex; gap:1.4rem; flex-wrap:wrap; }
    .vc-nav a{ text-decoration:none; color:var(--ivory); font-size:0.92rem; letter-spacing:0.03em; opacity:0.85; border-bottom:1px solid transparent; padding-bottom:2px; transition:opacity 0.2s, border-color 0.2s; }
    .vc-nav a:hover, .vc-nav a[aria-current="page"]{ opacity:1; border-color:var(--vel-gold); }

    /* ---------- Hero ---------- */
    .verse-hero{
      position:relative;
      background-color:var(--ink);
      background-image:
        linear-gradient(180deg, rgba(18,9,6,0.35) 0%, rgba(18,9,6,0.55) 55%, rgba(18,9,6,0.88) 100%),
        url("krishna-arjuna.jpg.png");
      background-repeat:no-repeat;
      background-position:center 20%;
      background-size:cover;
      min-height:74vh;
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      text-align:center; padding:3.5rem 1.5rem 3rem;
    }
    .verse-hero-eyebrow{
      font-family:'Cormorant Garamond', serif; font-weight:600; letter-spacing:0.18em;
      text-transform:uppercase; font-size:0.82rem; color:var(--gold-bright); opacity:0.85;
      margin-bottom:0.7rem;
    }
    .verse-hero-title{
      font-family:'Cormorant Garamond', serif; font-size:clamp(1.9rem, 4.5vw, 3.1rem); font-weight:700;
      color:var(--ivory); text-shadow:0 3px 16px rgba(0,0,0,0.65);
      margin:0 0 2rem; max-width:760px; letter-spacing:0.01em;
    }

    .verse-box{
      position:relative;
      background:rgba(18,9,6,0.66); backdrop-filter:blur(5px);
      border:1px solid var(--rule);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:2.1rem 2.3rem 2rem;
      max-width:640px; width:100%;
    }
    .verse-box::before{
      content:""; position:absolute; top:-1px; left:50%; transform:translateX(-50%);
      width:34px; height:5px; background:var(--vel-gold); border-radius:0 0 6px 6px;
    }
    .verse-day-label{
      font-family:'Cormorant Garamond', serif; font-weight:600;
      font-size:0.8rem; letter-spacing:0.14em; text-transform:uppercase;
      color:var(--gold-bright); opacity:0.9; margin-bottom:0.9rem;
    }
    .verse-sanskrit{
      font-family:'Noto Serif Devanagari', serif; font-weight:600;
      font-size:1.55rem; line-height:1.6; color:var(--ivory);
      text-shadow:0 2px 10px rgba(0,0,0,0.5);
      margin-bottom:1rem;
    }
    .verse-meaning{ font-size:1.05rem; opacity:0.9; font-style:italic; color:var(--ivory); }

    /* ---------- Actions ---------- */
    .verse-actions{
      margin:0 auto; max-width:640px; padding:2.6rem 1.5rem 4.5rem;
      text-align:center; display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;
    }
    .vc-btn{
      display:inline-flex; align-items:center; gap:0.5rem;
      font-family:'Cormorant Garamond', serif; font-weight:600; font-size:1.02rem;
      letter-spacing:0.02em; text-decoration:none; border-radius:999px;
      padding:0.75rem 1.6rem; transition:transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .vc-btn:hover{ transform:translateY(-2px); }
    .vc-btn-primary{
      background:linear-gradient(180deg, var(--vel-gold), #b7872f); color:var(--ink-deep);
      box-shadow:0 14px 28px -12px rgba(200,155,60,0.55);
    }
    .vc-btn-primary:hover{ box-shadow:0 18px 34px -12px rgba(200,155,60,0.7); }
    .vc-btn-outline{
      background:rgba(200,155,60,0.06); color:var(--gold-bright);
      border:1px solid var(--rule);
    }
    .vc-btn-outline:hover{ border-color:var(--vel-gold); background:rgba(200,155,60,0.12); }

    .vc-footer{ text-align:center; padding:2.6rem 1.5rem 3rem; border-top:1px solid var(--rule); color:var(--ivory); opacity:0.7; font-size:0.85rem; }
    .vc-footer-ornament{ font-family:'Cormorant Garamond', serif; color:var(--gold-bright); letter-spacing:0.25em; font-size:0.85rem; margin-bottom:0.7rem; opacity:0.9; }

    @media (max-width:560px){
      .verse-hero{ min-height:68vh; padding:2.6rem 1rem 2.4rem; }
      .verse-box{ padding:1.6rem 1.4rem 1.6rem; }
      .verse-sanskrit{ font-size:1.3rem; }
      .vc-header-inner{ justify-content:center; text-align:center; }
    }
  </style>
</head>
<body class="vc-body">
  <a href="#main" class="vc-skip-link">Skip to content</a>

  <header class="vc-header">
    <div class="vc-header-inner">
      <a class="vc-brand" href="index.html">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L14 10 L12 22 L10 10 Z" fill="#c89b3c"/><path d="M12 2 L14 10 L10 10 Z" fill="#e6c877"/></svg>
        Vedic Corner
      </a>
      <nav class="vc-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="verse.html" aria-current="page">Daily Verse</a>
        <a href="tamil_poems.html">Tamil Poems</a>
        <a href="search.html">Search</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="verse-hero">
      <div class="verse-hero-eyebrow">Bhagavad Gita</div>
      <div class="verse-hero-title">Krishna's Teachings to Arjuna</div>
      <div class="verse-box">
        <div class="verse-day-label" id="verseDay"></div>
        <div class="verse-sanskrit" id="verseText" lang="sa"></div>
        <div class="verse-meaning" id="verseMeaning"></div>
      </div>
    </div>

    <div class="verse-actions">
      <a class="vc-btn vc-btn-primary" href="https://www.gutenberg.org/files/2388/2388-h/2388-h.htm" target="_blank" rel="noopener">📖 Read the Full Bhagavad Gita</a>
      <a class="vc-btn vc-btn-outline" href="search.html">🔍 Search More Verses</a>
    </div>
  </main>

  <footer class="vc-footer">
    <div class="vc-footer-ornament">✧ ॐ ✧</div>
    © <span id="year"></span> Vedic Corner — Built with care
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const verses = [
      { text: "कर्मण्येवाधिकारस्ते मा फलेषु कदाचन", meaning: "You have the right to action, but not to the fruits." },
      { text: "योगः कर्मसु कौशलम्", meaning: "Yoga is skill in action." },
      { text: "समत्वं योग उच्यते", meaning: "Equanimity is called yoga." },
      { text: "अहिंसा परमो धर्मः", meaning: "Non-violence is the highest duty." },
      { text: "ज्ञानेन तु तदज्ञानं येषां नाशितमात्मनः", meaning: "Through knowledge, ignorance is destroyed." },
      { text: "वासांसि जीर्णानि यथा विहाय", meaning: "As a person discards old clothes, so the soul discards old bodies." },
      { text: "न जायते म्रियते वा कदाचित्", meaning: "The soul is never born, nor does it ever die." },
      { text: "यदा यदा हि धर्मस्य ग्लानिर्भवति भारत", meaning: "Whenever righteousness declines, I manifest Myself." },
      { text: "धर्मसंस्थापनार्थाय सम्भवामि युगे युगे", meaning: "To protect dharma, I appear in every age." },
      { text: "ममैवांशो जीवलोके जीवभूतः सनातनः", meaning: "Living beings are My eternal fragments." },
      { text: "ज्ञानी त्वात्मैव मे मतम्", meaning: "The wise are considered as My very self." },
      { text: "अनन्याश्चिन्तयन्तो मां ये जनाः पर्युपासते", meaning: "Those who worship Me with exclusive devotion, I protect." },
      { text: "मृत्युः सर्वहरश्चाहम्", meaning: "I am death, the destroyer of all." },
      { text: "विद्यां चाविद्यां च यस्तद्वेदोभयंसह", meaning: "One who knows both knowledge and ignorance transcends death." },
      { text: "उद्धरेदात्मनाऽऽत्मानं", meaning: "Let a man lift himself by his own self." },
      { text: "न त्वेवाहं जातु नासं न त्वं नेमे जनाधिपाः", meaning: "Never was there a time when I did not exist, nor you, nor these kings." },
      { text: "न हि कश्चित्क्षणमपि जातु तिष्ठत्यकर्मकृत्", meaning: "No one can remain without action even for a moment." },
      { text: "श्रद्धावान् लभते ज्ञानम्", meaning: "The faithful attain knowledge." },
      { text: "नासतो विद्यते भावो नाभावो विद्यते सतः", meaning: "The unreal never is; the real never ceases to be." },
      { text: "त्रैगुण्यविषया वेदा निस्त्रैगुण्यो भव अर्जुन", meaning: "The Vedas deal with the three gunas; be beyond these, O Arjuna." },
      { text: "यत्र योगेश्वरः कृष्णो यत्र पार्थो धनुर्धरः", meaning: "Wherever Krishna and Arjuna are, there is victory." },
      { text: "यः सर्वत्रानभिस्नेहस्तत्तत्प्राप्य शुभाशुभम्", meaning: "He who is unattached to outcomes attains peace." },
      { text: "निराशीर्यतचित्तात्मा त्यक्तसर्वपरिग्रहः", meaning: "The one without desires, self-controlled, free from possessions, attains peace." },
      { text: "श्रेयान्स्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्", meaning: "Better one's own duty without merit than another's duty well performed." },
      { text: "मन्मना भव मद्भक्तो मद्याजी मां नमस्कुरु", meaning: "Think of Me, be devoted to Me, sacrifice to Me, bow to Me." }
    ];

    function getDailyVerse() {
      const today = new Date();
      const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
      return { verse: verses[dayOfYear % verses.length], dayOfYear };
    }

    const { verse, dayOfYear } = getDailyVerse();
    document.getElementById("verseDay").textContent = `Verse for Day ${dayOfYear} of the Year`;
    document.getElementById("verseText").textContent = verse.text;
    document.getElementById("verseMeaning").textContent = verse.meaning;
  </script>
</body>
</html>
